<template>
    <lightning-card>
        <div class="slds-var-p-around_xx-small slds-grid">
            <template if:false={loadFinished}>
                <div class="spinnerContainer">
                    <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                </div> 
            </template>
            <div id="attachmentCombobox" class="slds-col">
                <lightning-combobox
                    class="slds-p-bottom_medium .slds-size_1-of-2"
                    name="progress"
                    value={value}
                    label="Choose an attachment"
                    placeholder="Choose an attachment..."
                    options={picklistOptions}
                    variant="label-hidden"
                    onchange={handleChange}></lightning-combobox>
            </div>
          &nbsp;  <lightning-button-icon icon-name="utility:refresh" variant="brand" alternative-text="Refresh" title="Refresh" onclick={refreshComponent}></lightning-button-icon>
       
        </div>
       

        <div if:true={ChangeloadFinished} class="slds-spinner_inline spinner-padding">
            <lightning-spinner variant="brand" 
                                alternative-text="Loading...."     
                                size="medium" >Loading....
            </lightning-spinner>
        </div>
    </lightning-card>
</template>
